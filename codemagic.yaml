workflows:
  ios_unsigned:
    name: iOS Unsigned Build (APP only)

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean project
        script: |
          flutter clean
          flutter pub get

      - name: Remove ALL iOS signing
        script: |
          cd ios

          # DEVELOPMENT_TEAM 완전 제거
          find . -name project.pbxproj -exec sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' {} \;

          # 자동 서명 제거
          find . -name project.pbxproj -exec sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' {} \;

          # CODE_SIGNING_ALLOWED 완전 비활성화
          find . -name project.pbxproj -exec sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' {} \;

          cd ..

      - name: Build iOS app (NO SIGN)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/Runner.app