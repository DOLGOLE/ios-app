workflows:
  ios_ipa_build:
    name: iOS IPA Build (Sideload Ready)

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean
        script: |
          flutter clean
          flutter pub get

      - name: Build IPA (unsigned allowed)
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa