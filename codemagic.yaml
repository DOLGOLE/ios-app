workflows:
  ios_unsigned_app:
    name: iOS Unsigned .app Build

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Clean iOS pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS app (NO CODESIGN)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/Runner.app