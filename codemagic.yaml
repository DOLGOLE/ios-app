workflows:
  ios-test:
    name: iOS SideStore Build

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter Doctor
        script: |
          flutter doctor -v

      - name: Get packages
        script: |
          flutter pub get

      - name: Check iOS project
        script: |
          ls -R ios
          xcodebuild -list -project ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          flutter build ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive